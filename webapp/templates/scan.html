<!DOCTYPE html>
<html>
<head>
    <title>Scan QR - {{ action }}</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: grid;
            place-items: center;
            height: 75vh;
            margin: 0;
        }

        .success{
            background-color: green;
        }
    </style>

</head>
<body>
    <h2>Scan a QR code for:  "{{ action }}"</h2>
    <div id="reader" style="width: 90%;"></div>
    <div id="state">
    </div>
    <p id="status">Waiting for QR...</p>
    <!--<button id="btn_scan_0">id0</button> Used for testing without scanning-->

    <script>
        const action = "{{ action }}";

        let isScanning = true;

        /*/ Simulate scan error: the person has already been registered.
        document.getElementById("btn_scan_0").addEventListener("click", () =>{
             onScanSuccess("https://www.linkedin.com/in/rfemenia/?gmcid=0");
        });
        */

        // Registers the student for the selected event
        function onScanSuccess(decodedText) {
                
            // Block new scans 3 seconds after scaning
            if (!isScanning) return;
            isScanning = false;


            document.getElementById("status").innerText = "✅ Scanning: " + decodedText;

            // Allow scanning again after 3 seconds
            setTimeout(() => {
                isScanning = true;
                document.getElementById("status").innerText = "Waiting for QR...";
                document.getElementById("state").innerHTML = ``;
            }, 3000);
        

            // Send the registration request
            let response_code;
            document.getElementById("status").innerText = "QR detectado: " + decodedText;
            fetch("submit.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ qr: decodedText, action: action })
            })
            .then(response => {
                response_code = response.status;
                console.log(response_code);
                console.log(response);
            })
            .then(data => {
                // Show response status
                document.getElementById("status").innerText = ""+response_code;

                if (response_code == 200){
                    // Show a success alert and paint green the background
                    document.getElementById("state").innerHTML=`
                    <div class="alert alert-success" role="alert">
                        <h4 class="alert-heading">Attendant registeredd!</h4>
                        <p>The student has been succesfully registered for lunch. Enjoy the meal!</p>
                    </div>`;
                    document.body.style.backgroundColor = "lightgreen";
                    setTimeout(() => {
                        document.body.style.backgroundColor = "white";
                    }, 3000);

                } else if (response_code == 409){
                    // 
                    document.getElementById("state").innerHTML=`
                    <div class="alert alert-warning" role="alert">
                        <strong>Reused code!</strong>The student has been already registered.
                    </div>`;

                    document.body.style.backgroundColor = "red";
                    setTimeout(() => {
                        document.body.style.backgroundColor = "white";
                    }, 3000);                     


                }else{
                    document.getElementById("state").innerHTML=`
                    <div class="alert alert-warning" role="alert">
                        
                        <h4 class="alert-heading">UNKNOWN ERROR!</h4>
                    </div>`;

                    console.log();

                    document.body.style.backgroundColor = "yellow";
                    setTimeout(() => {
                        document.body.style.backgroundColor = "white";
                    }, 3000); 
                }               
            })
            .catch(err => {
                console.error(err);
                document.getElementById("status").innerText = "Error while registering the QR";
            });
        }

        // Reactivate scanning after 3 seconds
            setTimeout(() => {
                isScanning = true;
            }, 3000);

            
        // Enable the cammera
        const html5QrCode = new Html5Qrcode("reader");
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length) {
                html5QrCode.start(devices[1].id, { fps: 10, qrbox: 650 }, onScanSuccess);
            }
        });
    </script>
</body>
</html>
